version: "3.8"

services:
  frontend:

    build:

      context: ./frontend

    ports:

      - "3001:5173"

    volumes:

      - ./frontend:/app # reload

      - frontend_node_modules:/app/node_modules

    environment:

      - NODE_ENV=development

      - VITE_API_URL=http://localhost:8080


  # Backend Service (Go API)

  backend:

    build:

      context: ./api

    ports:

      - "8080:8080"

    environment:

      # Database and other service connections (loaded from .env file)

      - DB_HOST=postgres

      - DB_PORT=${DB_PORT}

      - DB_USER=${DB_USER}

      - DB_PASSWORD=${DB_PASSWORD}

      - DB_NAME=${DB_NAME}

      - MONGO_URI=mongodb://mongo:27017/app_database

      - IPFS_API=http://ipfs:5001

    depends_on:

      postgres:

        condition: service_healthy

      mongo:

        condition: service_started

      ipfs:

        condition: service_started

  # PostgreSQL Database Service

  postgres:

    image: postgres:15

    ports:

      - "5432:5432"

    environment:

      # PostgreSQL credentials (loaded from .env file)

      - POSTGRES_USER=${POSTGRES_USER}

      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

      - POSTGRES_DB=${POSTGRES_DB}

    volumes:

      - postgres_data:/var/lib/postgresql/data # Persist PostgreSQL data

    healthcheck: #check if postgres is ready

      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]

      interval: 5s

      timeout: 5s

      retries: 5

      start_period: 10s #time to start up before checking

  # MongoDB Database Service

  mongo:

    image: mongo:latest

    ports:

      - "27017:27017"

    environment:

      # MongoDB credentials (loaded from .env file)

      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}

      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}

      - MONGO_INITDB_DATABASE=app_database

    command: ["--auth"]

    volumes:

      - mongo_data:/data/db # Persist MongoDB data

  # IPFS Service

  ipfs:

    image: ipfs/kubo:latest

    ports:

      - "5001:5001" # API port

      - "8081:8080" # Gateway port

    volumes:

      - ipfs_data:/data/ipfs
volumes:

  postgres_data:

  mongo_data:

  ipfs_data:

  frontend_node_modules:
 